<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHJ - Ultra 3D Medical System</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff88;
            --deep-bg: #050a10;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at center, #102a43 0%, #050a10 100%);
            color: #e0e6ed; height: 100vh; display: flex; overflow: hidden;
        }

        /* Login Screen */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(25px);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-card {
            background: var(--glass); padding: 50px; border-radius: 30px;
            border: 1px solid var(--border); text-align: center;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); width: 400px;
        }
        .login-card h1 { font-family: 'Orbitron'; color: var(--neon-blue); margin-bottom: 20px; }
        .login-card input {
            width: 90%; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border); border-radius: 10px; color: white; text-align: center;
        }
        .login-card button {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background: linear-gradient(90deg, var(--neon-blue), #0072ff);
            color: white; font-weight: bold; cursor: pointer;
        }

        /* Layout */
        #main-app { display: none; width: 100%; height: 100vh; }
        .side-bar { width: 55%; padding: 25px; overflow-y: auto; border-right: 1px solid var(--border); }
        .data-panel { width: 45%; padding: 25px; overflow-y: auto; background: rgba(0,0,0,0.3); }

        .glass-box {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 15px; padding: 20px; margin-bottom: 20px;
        }

        h2, h3 { font-family: 'Orbitron'; color: var(--neon-blue); margin: 0 0 15px 0; }
        label { display: block; font-size: 11px; color: #8899a6; margin-bottom: 5px; font-weight: bold; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select {
            width: 100%; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            border-radius: 8px; color: #fff; box-sizing: border-box;
        }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-family: 'Orbitron'; font-size: 11px; cursor: pointer; transition: 0.3s;
        }
        .btn-save { background: var(--neon-green); color: #000; }
        .btn-print { background: var(--neon-blue); color: #000; }
        .btn-clear { background: #555; color: #fff; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: var(--neon-blue); text-align: left; padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
        td { padding: 10px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        @media print {
            body * { visibility: hidden; }
            .side-bar, .side-bar * { visibility: visible; }
            .side-bar { position: absolute; left: 0; top: 0; width: 100%; }
            .btn-group, .data-panel { display: none; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <h1>AHJ SYSTEM</h1>
        <input type="text" id="userInput" placeholder="USER ID (admin)">
        <input type="password" id="passInput" placeholder="PASSWORD (123)">
        <button onclick="login()">AUTHORIZE SYSTEM</button>
    </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
    <div class="side-bar" id="printArea">
        <h2>🏥 AZIZ HOSPITAL JATOI</h2>
        
        <div class="glass-box">
            <div class="input-grid">
                <div><label>DATE</label><input type="date" id="entryDate"></div>
                <div><label>MR NUMBER</label><input type="text" id="mrNumber" placeholder="Search/New"></div>
                <div><label>TOKEN NO</label><input type="text" id="appNo" readonly style="color:var(--neon-green)"></div>
                <div><label>TIME</label><input type="time" id="entryTime"></div>
            </div>
        </div>

        <div class="glass-box">
            <h3>PATIENT INFO</h3>
            <div class="input-grid">
                <div style="grid-column: span 2;"><label>PATIENT NAME</label><input type="text" id="pName"></div>
                <div><label>AGE</label><input type="number" id="age"></div>
                <div><label>GENDER</label><select id="gender"><option>Male</option><option>Female</option></select></div>
                <div><label>CONTACT</label><input type="text" id="contact"></div>
                <div><label>CONSULTANT</label>
                    <select id="drName" onchange="updateFee()">
                        <option value="">Select Dr.</option>
                        <option value="Dr. Abdul Aziz SB">Dr. Abdul Aziz SB</option>
                        <option value="DR. Shahid Aziz SB">DR. Shahid Aziz SB</option>
                        <option value="Dr. Ali Naqi SB">Dr. Ali Naqi SB</option>
                    </select>
                </div>
            </div>
            <div style="margin-top:15px"><label>FEES (PKR)</label><input type="number" id="fee"></div>
        </div>

        <div class="btn-group">
            <button class="action-btn btn-save" onclick="saveData()">SAVE RECORD</button>
            <button class="action-btn btn-print" onclick="window.print()">PRINT SLIP</button>
            <button class="action-btn btn-clear" onclick="resetForm()">NEW ENTRY</button>
        </div>
    </div>

    <div class="data-panel">
        <h3>RECORDS HISTORY</h3>
        <table id="recordTable">
            <thead>
                <tr>
                    <th>MR#</th>
                    <th>Name</th>
                    <th>Doctor</th>
                    <th>Fee</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let patients = JSON.parse(localStorage.getItem('hospitalData')) || [];

    // 1. Login Logic
    function login() {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        if(u === "admin" && p === "123") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            resetForm();
            loadTable();
        } else { alert("Wrong ID/Pass!"); }
    }

    // 2. Auto Data Generation
    function resetForm() {
        document.getElementById('entryDate').valueAsDate = new Date();
        document.getElementById('entryTime').value = new Date().toLocaleTimeString('en-GB', {hour12:false, hour:'2-digit', minute:'2-digit'});
        document.getElementById('appNo').value = "TK-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('mrNumber').value = "";
        document.getElementById('pName').value = "";
        document.getElementById('age').value = "";
        document.getElementById('fee').value = "";
    }

    function updateFee() {
        const fees = {"Dr. Abdul Aziz SB": 1500, "DR. Shahid Aziz SB": 1200, "Dr. Ali Naqi SB": 1000};
        document.getElementById('fee').value = fees[document.getElementById('drName').value] || 0;
    }

    // 3. Save & Load
    function saveData() {
        const data = {
            mr: document.getElementById('mrNumber').value || 'N/A',
            name: document.getElementById('pName').value,
            dr: document.getElementById('drName').value,
            fee: document.getElementById('fee').value,
            date: document.getElementById('entryDate').value
        };

        if(!data.name) return alert("Name is required!");
        
        patients.push(data);
        localStorage.setItem('hospitalData', JSON.stringify(patients));
        loadTable();
        alert("Record Saved!");
    }

    function loadTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        patients.slice().reverse().forEach((p, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.mr}</td>
                    <td>${p.name}</td>
                    <td>${p.dr}</td>
                    <td>${p.fee}</td>
                    <td><button onclick="deleteRecord(${patients.length - 1 - index})" style="color:red; background:none; border:none; cursor:pointer">✖</button></td>
                </tr>`;
        });
    }

    function deleteRecord(index) {
        if(confirm("Delete this record?")) {
            patients.splice(index, 1);
            localStorage.setItem('hospitalData', JSON.stringify(patients));
            loadTable();
        }
    }
</script>

</body>
</html>
