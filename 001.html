<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHJ - Ultra 3D Cloud System</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00f2ff; --neon-green: #00ff88; --deep-bg: #050a10; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: radial-gradient(circle at center, #102a43 0%, #050a10 100%); color: #e0e6ed; height: 100vh; display: flex; overflow: hidden; }
        
        /* Login Screen */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: var(--glass); padding: 50px; border-radius: 30px; border: 1px solid var(--border); text-align: center; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); width: 400px; }
        .login-card h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); letter-spacing: 3px; margin: 0; }
        .login-card input { width: 100%; margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 10px; color: white; text-align: center; font-size: 18px; box-sizing: border-box; }
        .login-card button { width: 100%; margin-top: 20px; padding: 15px; border: none; border-radius: 10px; background: linear-gradient(90deg, var(--neon-blue), #0072ff); color: white; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; }

        /* Main Layout */
        #main-app { display: none; width: 100%; height: 100vh; display: flex; }
        .side-bar { width: 60%; padding: 20px; overflow-y: auto; border-right: 1px solid var(--border); }
        .archive-panel { width: 40%; padding: 20px; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        
        .glass-box { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        h2, h3 { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); margin-top: 0; font-size: 18px; }
        
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        label { display: block; font-size: 11px; color: #8899a6; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px; color: #fff; box-sizing: border-box; }
        
        /* Buttons */
        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .action-btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; transition: 0.2s; }
        .btn-save { background: #34495e; color: white; }
        .btn-print { background: var(--neon-blue); color: black; }
        .btn-add { background: var(--neon-green); color: black; }
        .btn-del { background: #ff4b2b; color: white; }

        /* Table */
        .table-container { flex-grow: 1; overflow-y: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 10px; color: var(--neon-blue); border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #050a10; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .dev-footer { text-align: center; padding: 15px; font-size: 12px; color: var(--neon-blue); border-top: 1px solid var(--border); margin-top: auto; }
    </style>
</head>
<body onload="checkLogin()">

<div id="login-screen">
    <div class="login-card">
        <h1>AHJ SYSTEM</h1>
        <p style="color: #666;">ULTRA 3D CLOUD ACCESS</p>
        <input type="text" id="userInput" placeholder="USER ID">
        <input type="password" id="passInput" placeholder="PASSWORD">
        <button onclick="login()">AUTHORIZE SYSTEM</button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="side-bar">
        <h2>🏥 AZIZ HOSPITAL JATOI</h2>
        
        <div class="glass-box">
            <div class="input-grid">
                <div><label>Date</label><input type="date" id="entryDate"></div>
                <div><label>Time</label><input type="time" id="entryTime"></div>
                <div>
                    <label>MR Number</label>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="mrNumber" placeholder="Auto">
                        <button onclick="searchPatient()" style="background:var(--neon-blue); border:none; padding:0 10px; border-radius:5px; cursor:pointer;">🔍</button>
                    </div>
                </div>
                <div><label>Token No</label><input type="text" id="appNo" readonly style="color:var(--neon-green); font-weight:bold;"></div>
            </div>
        </div>

        <div class="glass-box">
            <h3>Patient Info</h3>
            <div class="input-grid">
                <div style="grid-column: span 2;"><label>Full Name</label><input type="text" id="pName"></div>
                <div><label>Contact</label><input type="text" id="contact"></div>
                <div><label>CNIC</label><input type="text" id="cnic"></div>
                <div><label>Age</label><input type="number" id="age"></div>
                <div><label>Gender</label><select id="gender"><option>Male</option><option>Female</option></select></div>
            </div>
        </div>

        <div class="glass-box">
            <h3>Clinical & Vitals</h3>
            <div class="input-grid">
                <div>
                    <label>Doctor</label>
                    <select id="drName">
                        <option value="">Select Doctor</option>
                        <option>Dr. Abdul Aziz</option>
                        <option>Dr. Shahid Aziz</option>
                        <option>Dr. Ali Naqi</option>
                    </select>
                </div>
                <div><label>Fee (PKR)</label><input type="number" id="fee"></div>
            </div>
            <div class="input-grid" style="margin-top:10px;">
                <input type="text" id="bp" placeholder="BP">
                <input type="text" id="temp" placeholder="Temp">
                <input type="text" id="pulse" placeholder="Pulse">
                <input type="text" id="spo2" placeholder="SPO2 %">
            </div>
        </div>

        <div class="btn-group">
            <button class="action-btn btn-save" onclick="saveData()">SAVE</button>
            <button class="action-btn btn-print" onclick="window.print()">PRINT</button>
            <button class="action-btn btn-add" onclick="resetForm()">NEW</button>
            <button class="action-btn btn-del" onclick="clearAllData()">CLEAR ALL</button>
        </div>
    </div>

    <div class="archive-panel">
        <h3>ARCHIVE FILTER</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="date" id="filterDate" onchange="filterData()">
            <button onclick="filterData()" style="background:var(--neon-blue); border:none; border-radius:5px; padding:0 15px; cursor:pointer;">QUERY</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>MR#</th><th>Name</th><th>Doctor</th><th>Date</th></tr>
                </thead>
                <tbody id="patientTableBody"></tbody>
            </table>
        </div>

        <div class="dev-footer">
            DESIGNED BY: <b>AYAZ AHMED</b><br>
            <small>AHJ ULTRA CLOUD SYSTEM v2.0</small>
        </div>
    </div>
</div>

<script>
    // Login Logic
    function login() {
        const user = document.getElementById('userInput').value;
        const pass = document.getElementById('passInput').value;
        if(user === "admin" && pass === "123") {
            sessionStorage.setItem("logged", "true");
            checkLogin();
        } else { alert("Wrong ID or Password!"); }
    }

    function checkLogin() {
        if(sessionStorage.getItem("logged") === "true") {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('main-app').style.display = "flex";
            generateMR();
            loadTable();
        }
    }

    // Auto Generate MR and Token
    function generateMR() {
        let patients = JSON.parse(localStorage.getItem("patients") || "[]");
        let nextMR = patients.length > 0 ? Math.max(...patients.map(p => p.mr)) + 1 : 1001;
        document.getElementById('mrNumber').value = nextMR;
        document.getElementById('appNo').value = "TKN-" + (patients.length + 1);
        document.getElementById('entryDate').valueAsDate = new Date();
    }

    // Save Data
    function saveData() {
        let patient = {
            mr: document.getElementById('mrNumber').value,
            name: document.getElementById('pName').value,
            date: document.getElementById('entryDate').value,
            doctor: document.getElementById('drName').value,
            fee: document.getElementById('fee').value
        };

        if(!patient.name) { alert("Please enter Name!"); return; }

        let patients = JSON.parse(localStorage.getItem("patients") || "[]");
        patients.push(patient);
        localStorage.setItem("patients", JSON.stringify(patients));
        
        alert("Data Saved Successfully!");
        loadTable();
        resetForm();
    }

    // Load Table
    function loadTable() {
        let patients = JSON.parse(localStorage.getItem("patients") || "[]");
        displayData(patients);
    }

    function displayData(data) {
        let html = "";
        data.reverse().forEach(p => {
            html += `<tr><td>${p.mr}</td><td>${p.name}</td><td>${p.doctor}</td><td>${p.date}</td></tr>`;
        });
        document.getElementById('patientTableBody').innerHTML = html;
    }

    // Filter
    function filterData() {
        let date = document.getElementById('filterDate').value;
        let patients = JSON.parse(localStorage.getItem("patients") || "[]");
        let filtered = patients.filter(p => p.date === date);
        displayData(filtered);
    }

    function resetForm() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        generateMR();
    }

    function clearAllData() {
        if(confirm("Saray records delete kar den?")) {
            localStorage.removeItem("patients");
            loadTable();
            generateMR();
        }
    }
</script>

</body>
</html>
